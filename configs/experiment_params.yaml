experiment:
  name: burnout_prediction
  tracking:
    log_model: true
    log_feature_importance: true

models:

  random_forest:
    enabled: true
    search_type: grid

    parameters:
      n_estimators:
        - 100
        - 200
        - 300

      max_depth:
        - 10
        - 20
        - null

      min_samples_split:
        - 2
        - 5

      min_samples_leaf:
        - 1
        - 2

      max_features:
        - sqrt
        - log2

      criterion:
        - gini
        - entropy

      class_weight:
        - balanced

      random_state:
        - 42

      n_jobs:
        - 4


  xgboost:
    enabled: true
    search_type: grid

    parameters:
      n_estimators:
        - 100
        - 200
        - 300

      learning_rate:
        - 0.01
        - 0.05
        - 0.1

      max_depth:
        - 3
        - 5
        - 7

      subsample:
        - 0.8
        - 1.0

      colsample_bytree:
        - 0.8
        - 1.0

      gamma:
        - 0
        - 0.1

      reg_alpha:
        - 0
        - 0.1

      reg_lambda:
        - 1
        - 5

      objective:
        - multi:softprob

      eval_metric:
        - mlogloss

      random_state:
        - 42


  logistic_regression:
    enabled: true
    search_type: grid

    parameters:
      C:
        - 0.01
        - 0.1
        - 1
        - 10

      penalty:
        - l2

      solver:
        - lbfgs
        - saga

      max_iter:
        - 1000

      class_weight:
        - balanced

      random_state:
        - 42